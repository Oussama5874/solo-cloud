name: Neo IPTV PRO Live Stream

on:
  schedule:
    - cron: '0 */4 * * *'  # تشغيل تلقائي كل 4 ساعات تماماً
  workflow_dispatch:      # يتيح لك تشغيل البث يدوياً في أي وقت بضغطة زر

jobs:
  run-stream:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install FFmpeg and Fonts
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg fonts-dejavu
        pip install requests

    - name: Start Stream Script
      env:
        PAGE_ID: ${{ secrets.PAGE_ID }}
        ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      run: python stream.py
